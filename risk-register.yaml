# Risk Register — The Relic
# Maintained continuously. Each phase gate review updates this file.
# Tiers (per skill): unacceptable | must-mitigate | transparency | minimal

risks:
  - id: R-001
    title: Vocabulary drift breaks listener bridges
    severity: HIGH
    likelihood: HIGH
    tier: must-mitigate
    description: >
      A host rename of a concept (e.g., "Scaling Laws" → "Scaling Law") silently
      invalidates every previously-formed bridge that referenced the old id.
      Listener relics break without warning.
    mitigation:
      - Versioned concept IDs in Phase II ER schema
      - Alias table + migration spec (Phase II.5)
      - Concept registry is append-only; renames produce aliases, not replacements
    owner: Phase II
    status: open

  - id: R-002
    title: Narrative overreach
    severity: MEDIUM
    likelihood: MEDIUM
    tier: must-mitigate
    description: >
      Marketing or microcopy claims capabilities the artifact does not have
      (e.g., "queryable knowledge graph" when the artifact only shows visual emergence).
      Audited in venture-studio review on 2026-04-21.
    mitigation:
      - README truth-correction pass (W0.2)
      - Coherence audit at every gate
      - No present-tense claims for roadmap items
    owner: every phase
    status: in-progress

  - id: R-003
    title: Host abandonment kills the artifact
    severity: HIGH
    likelihood: MEDIUM
    tier: must-mitigate
    description: >
      A listener's relic is only valuable if the host keeps shipping episodes
      with disciplined vocabulary. Host attrition orphans every listener.
    mitigation:
      - Minimize host authoring effort (no CMS in v1; markdown/yaml only)
      - Provide episode-authoring templates
      - Founder commits to a 50-ep arc personally before recruiting host partner
      - Future: orphan-mode that lets listener continue without host (deferred)
    owner: Phase I (recruitment), Phase IV (commitment)
    status: open

  - id: R-004
    title: Listener-state portability
    severity: MEDIUM
    likelihood: MEDIUM
    tier: transparency
    description: >
      Personal relic state currently lives only in browser memory + JSON export.
      Cache clear = loss. No cross-device sync.
    mitigation:
      - Export/import is built (v0)
      - localStorage persistence (Phase II.7)
      - Cloud sync deferred to post-launch
      - Disclose limitation in microcopy
    owner: Phase II
    status: open

  - id: R-005
    title: Solo founder overload
    severity: MEDIUM
    likelihood: HIGH
    tier: must-mitigate
    description: >
      6-week plan assumes ~15–20 hr/wk founder availability. Skill principle 8:
      if an artifact requires a 10-person team, descope.
    mitigation:
      - Strict timebox per phase
      - Descoping rule documented in plan
      - Non-essential artifacts removable without breaking the gate
    owner: every phase
    status: open

  - id: R-006
    title: Phase I bias from personal network interviews
    severity: MEDIUM
    likelihood: HIGH
    tier: must-mitigate
    description: >
      3 of 5 interviews sourced from founder's personal network. Politeness bias
      will inflate confidence in pain validation.
    mitigation:
      - Mom Test discipline (past behavior only)
      - Discount personal-network confidence by one level when synthesizing
      - Cold-sourced 2 interviewees must be the tiebreaker
    owner: Phase I
    status: open

  - id: R-007
    title: Aesthetic over-commitment
    severity: LOW
    likelihood: MEDIUM
    tier: transparency
    description: >
      The zine aesthetic is opinionated. May polarize listeners who expected a
      cleaner SaaS-style product.
    mitigation:
      - Accept the polarization (named enemy is part of the thesis)
      - Test in Phase I interviews; if cohort universally rejects, reconsider
    owner: Phase I + III
    status: monitoring

  - id: R-008
    title: WCAG / accessibility regressions
    severity: MEDIUM
    likelihood: LOW
    tier: must-mitigate
    description: >
      Highly textured paper + low-contrast accent colors risk accessibility
      failures. Initial audit (W0.3) shows current pairs pass AA, but motion
      and reveal animations may trigger vestibular issues.
    mitigation:
      - Contrast audit in brand-tokens.yaml
      - Add prefers-reduced-motion media query (Phase III)
      - Keyboard navigation pass (Phase III)
    owner: Phase III
    status: partial

  - id: R-009
    title: First-N-episodes abandonment cliff
    severity: HIGH
    likelihood: HIGH
    tier: must-mitigate
    description: >
      Critical assumption: the "structure emerges" payoff is felt at ep 5–10.
      If listeners abandon at ep 3 because the relic still looks sparse, the
      entire compounding-value thesis fails.
    mitigation:
      - Test in Phase I (interview Q5, Q7)
      - Design ep 1–3 specifically to deliver early payoff
      - Frame the relic as "seed → forest" rather than "completed picture"
    owner: Phase I + IV
    status: open
